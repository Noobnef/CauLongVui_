# ===============================
# Application
# ===============================
spring.application.name=CauLongVui
server.port=8080

# ===============================
# SQL Server DataSource Configuration
# ===============================
# Dùng SQL Server Authentication (username + password)
# Nhớ bật "SQL Server and Windows Authentication Mode" trong SSMS > Server Properties > Security
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=caulongvui;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ===============================
# Static resources
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
