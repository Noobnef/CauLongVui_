<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gói Hội Viên — Cầu Lông Vui</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="stylesheet" href="/css/header-footer.css" />
  <style>
    .membership-page { padding: 120px 24px 80px; max-width: 1200px; margin: 0 auto; min-height: 80vh; }
    .page-header { text-align: center; margin-bottom: 60px; }
    .page-title { font-size: 36px; font-weight: 900; color: var(--dark); margin-bottom: 12px; letter-spacing: -1px; }
    .page-sub { font-size: 16px; color: var(--muted); max-width: 600px; margin: 0 auto; }

    .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; margin-top: 40px; }
    
    .plan-card {
      background: var(--white); border-radius: 24px; padding: 40px;
      border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }
    .plan-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); border-color: var(--green); }
    .plan-card.popular { border: 2px solid var(--green); transform: scale(1.03); z-index: 1; }
    .plan-card.popular:hover { transform: scale(1.03) translateY(-8px); }
    
    .popular-tag {
      position: absolute; top: 0; right: 0; background: var(--green); color: #fff;
      font-size: 11px; font-weight: 800; padding: 8px 20px; border-radius: 0 0 0 12px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .plan-name { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .plan-tier { font-size: 12px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; display: block; }
    
    .plan-price { margin-bottom: 32px; display: flex; align-items: baseline; gap: 4px; }
    .price-val { font-size: 40px; font-weight: 900; color: var(--dark); letter-spacing: -1px; }
    .price-unit { color: var(--muted); font-weight: 500; font-size: 15px; }

    .plan-features { list-style: none; margin-bottom: 40px; flex: 1; }
    .plan-features li {
      display: flex; align-items: flex-start; gap: 12px; font-size: 15px;
      color: var(--text); margin-bottom: 16px; line-height: 1.4;
    }
    .feature-check { color: var(--green); font-weight: 900; }
    .feature-cross { color: #ccc; font-weight: 900; }

    .btn-purchase {
      width: 100%; padding: 16px; border-radius: 12px; border: none;
      font-family: inherit; font-size: 15px; font-weight: 800; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-purchase-primary { background: var(--green); color: #fff; box-shadow: 0 6px 20px var(--green-glow); }
    .btn-purchase-primary:hover { background: var(--green-light); transform: translateY(-2px); }
    .btn-purchase-outline { background: transparent; border: 2.5px solid var(--green); color: var(--green); }
    .btn-purchase-outline:hover { background: var(--green-pale); }

    /* Modal chọn phương thức */
    .modal {
        display: none; position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content {
        background: #fff; border-radius: 20px; width: 100%; max-width: 440px;
        padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-header { margin-bottom: 24px; text-align: center; }
    .modal-title { font-size: 24px; font-weight: 800; color: var(--dark); }
    .modal-options { display: flex; flex-direction: column; gap: 12px; }
    .payment-option {
        display: flex; align-items: center; gap: 16px; padding: 18px;
        border: 2px solid var(--border); border-radius: 14px; cursor: pointer;
        transition: all 0.2s;
    }
    .payment-option:hover { border-color: var(--green); background: var(--green-pale); }
    .payment-option.active { border-color: var(--green); background: var(--green-pale); box-shadow: 0 0 0 2px var(--green); }
    .payment-icon { width: 44px; height: 44px; object-fit: contain; }
    .payment-text { display: flex; flex-direction: column; gap: 2px; }
    .payment-name { font-weight: 700; color: var(--dark); font-size: 16px; }
    .payment-desc { font-size: 12px; color: var(--muted); }
    
    .modal-footer { margin-top: 32px; display: flex; gap: 12px; }
    .btn-confirm { flex: 2; }
    .btn-cancel { flex: 1; background: #eee; color: var(--muted); }

    @media (max-width: 768px) {
      .plans-grid { grid-template-columns: 1fr; }
      .plan-card.popular { transform: none; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="membership-page">
    <div class="page-header">
      <h1 class="page-title">Nâng Cấp Trải Nghiệm Cùng <em>Hội Viên</em></h1>
      <p class="page-sub">
        Lựa chọn gói hội viên phù hợp để nhận ngay các ưu đãi đặc quyền, giảm giá đặt sân và tích điểm đổi quà hấp dẫn.
      </p>
    </div>

    <div class="plans-grid" id="plansGrid">
      <!-- Rendered by JS -->
      <div class="skeleton" style="height:500px"></div>
      <div class="skeleton" style="height:500px"></div>
      <div class="skeleton" style="height:500px"></div>
    </div>
  </main>

  <!-- Payment Modal -->
  <div class="modal" id="paymentModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Chọn Phương Thức Thanh Toán</h3>
      </div>
      <div class="modal-options">
        <div class="payment-option active" data-method="momo">
            <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" class="payment-icon" alt="Momo">
            <div class="payment-text">
                <span class="payment-name">Ví MoMo</span>
                <span class="payment-desc">Thanh toán qua ứng dụng MoMo</span>
            </div>
        </div>
        <div class="payment-option" data-method="vnpay">
            <img src="https://sandbox.vnpayment.vn/paymentv2/images/graph/vnpay-logo.png" class="payment-icon" alt="VNPay">
            <div class="payment-text">
                <span class="payment-name">VNPay</span>
                <span class="payment-desc">Thanh toán qua Ngân hàng hoặc QR</span>
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-purchase btn-cancel" onclick="closeModal()">Hủy</button>
        <button class="btn-purchase btn-purchase-primary btn-confirm" id="confirmBtn" onclick="processPurchase()">Thanh Toán Ngay</button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/js/app.js"></script>
  <script>
    let selectedPlanId = null;
    let selectedMethod = 'momo';

    async function loadPlans() {
      const grid = document.getElementById('plansGrid');
      try {
        const plans = await fetchAPI('/membership/plans');
        
        const featureMap = {
          'NORMAL': [
            ['Ưu tiên đặt sân cơ bản', true],
            ['Tích điểm đổi quà', true],
            ['Hỗ trợ khách hàng 24/7', true],
            ['Giảm giá đặt sân theo giờ', false],
            ['Dịch vụ phòng chờ VIP', false]
          ],
          'PRO': [
            ['Ưu tiên đặt sân cấp 2', true],
            ['Tích điểm X2', true],
            ['Giảm giá đặt sân 10%', true],
            ['Hỗ trợ chăm sóc đặc biệt', true],
            ['Dịch vụ phòng chờ VIP', false]
          ],
          'VIP': [
            ['Ưu tiên đặt sân cao nhất', true],
            ['Tích điểm X5', true],
            ['Giảm giá đặt sân 20%', true],
            ['Giao hàng miễn phí', true],
            ['Phòng chờ VIP & Nước uống miễn phí', true]
          ]
        };

        grid.innerHTML = plans.map(plan => {
          const isPopular = plan.tier === 'PRO';
          const features = featureMap[plan.tier] || [];
          
          return `
            <div class="plan-card ${isPopular ? 'popular' : ''}">
              ${isPopular ? '<div class="popular-tag">Phổ biến nhất</div>' : ''}
              <span class="plan-tier">${plan.tier}</span>
              <h3 class="plan-name">${plan.name}</h3>
              <div class="plan-price">
                <span class="price-val">${formatCurrency(plan.price).replace('₫', '')}</span>
                <span class="price-unit">₫ / ${plan.durationInDays} ngày</span>
              </div>
              <ul class="plan-features">
                ${features.map(f => `
                  <li>
                    <span class="${f[1] ? 'feature-check' : 'feature-cross'}">${f[1] ? '✓' : '✕'}</span>
                    ${f[0]}
                  </li>
                `).join('')}
              </ul>
              <button class="btn-purchase ${isPopular ? 'btn-purchase-primary' : 'btn-purchase-outline'}" 
                      onclick="openPaymentModal(${plan.id})">
                Mua gói ngay
              </button>
            </div>
          `;
        }).join('');
      } catch (err) {
        showToast('Không thể tải danh sách gói: ' + err.message, 'error');
      }
    }

    function openPaymentModal(planId) {
      if (!requireAuth()) return;
      selectedPlanId = planId;
      document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('paymentModal').style.display = 'none';
      selectedPlanId = null;
    }

    // Modal option logic
    document.querySelectorAll('.payment-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            selectedMethod = opt.dataset.method;
        });
    });

    async function processPurchase() {
      const user = getCurrentUser();
      const btn = document.getElementById('confirmBtn');
      btn.disabled = true;
      btn.textContent = 'Đang xử lý...';

      try {
        // API endpoint: /api/membership/purchase/{planId}?userId={userId}&method={method}
        const res = await fetch(`${API_BASE}/membership/purchase/${selectedPlanId}?userId=${user.id}&method=${selectedMethod}`, {
          method: 'POST'
        });
        
        const json = await res.json();
        if (res.ok && json.data.paymentUrl) {
          window.location.href = json.data.paymentUrl;
        } else {
          throw new Error(json.message || 'Lỗi thanh toán');
        }
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Thanh Toán Ngay';
      }
    }

    document.addEventListener('DOMContentLoaded', loadPlans);
  </script>
</body>
</html>
